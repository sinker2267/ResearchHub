version: '3.8'

services:
  # === PostgreSQL ===
  db:
    image: postgres:16-alpine
    container_name: researchhub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-researchhub}
      POSTGRES_USER: ${POSTGRES_USER:-researchhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-researchhub}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-researchhub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Go API Server ===
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: researchhub-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-researchhub}:${POSTGRES_PASSWORD:-researchhub}@db:5432/${POSTGRES_DB:-researchhub}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-random-secret-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # === Nginx (Frontend + Reverse Proxy) ===
  nginx:
    image: nginx:1.25-alpine
    container_name: researchhub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./research-hub/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
