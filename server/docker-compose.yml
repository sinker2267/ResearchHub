version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: researchhub-db
    environment:
      POSTGRES_DB: researchhub
      POSTGRES_USER: researchhub
      POSTGRES_PASSWORD: researchhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: researchhub-server
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: "postgres://researchhub:researchhub@db:5432/researchhub?sslmode=disable"
      JWT_SECRET: "change-this-to-a-random-secret-in-production"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
